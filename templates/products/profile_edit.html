{% extends 'base.html' %}
{% load static %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">✏️ Редактирование профиля</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="full_name" class="form-label">ФИО</label>
                        <input type="text" name="full_name" id="full_name" class="form-control" 
                               value="{{ user.full_name|default:'' }}" placeholder="Введите ваше ФИО">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" id="email" class="form-control" 
                               value="{{ user.email|default:'' }}" placeholder="Введите ваш email">
                    </div>
                    
                    <div class="mb-3">
                        <label for="birth_date" class="form-label">Дата рождения</label>
                        <input type="text" name="birth_date" id="birth_date" class="form-control" 
                               value="{% if user.birth_date %}{{ user.birth_date|date:'d.m.Y' }}{% endif %}" 
                               placeholder="ДД.ММ.ГГГГ (например, 06.02.2008)">
                        <div class="form-text">Введите дату в формате ДД.ММ.ГГГГ</div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                        <a href="{% url 'products:profile' %}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
